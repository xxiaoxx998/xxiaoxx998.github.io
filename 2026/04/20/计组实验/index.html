n class="number">2</span>]&amp;~Funct3[<span class="number">1</span>]&amp;~Funct3[<span class="number">0</span>]; <span class="comment">// add 0000000 000</span></span><br><span class="line">...</span><br><span class="line"></span><br><span class="line"><span class="comment">// 生成控制信号</span></span><br><span class="line">  <span class="keyword">assign</span> RegWrite   = rtype | itype_r | LUI | itype_l; <span class="comment">// register write</span></span><br><span class="line">  <span class="keyword">assign</span> MemWrite   = stype;                           <span class="comment">// memory write</span></span><br><span class="line">  <span class="keyword">assign</span> ALUSrc     = itype_r | LUI | itype_l | stype;   <span class="comment">// ALU B is from instruction immediate</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//EXTOp 立即数操作信号 EXT.v查看具体实现</span></span><br><span class="line">  <span class="comment">// EXT_CTRL_ITYPE_SHAMT 6&#x27;b100000</span></span><br><span class="line">  <span class="comment">// EXT_CTRL_ITYPE	      6&#x27;b010000</span></span><br><span class="line">  <span class="comment">// EXT_CTRL_STYPE	      6&#x27;b001000</span></span><br><span class="line">  <span class="comment">// EXT_CTRL_BTYPE	      6&#x27;b000100</span></span><br><span class="line">  <span class="comment">// EXT_CTRL_UTYPE	      6&#x27;b000010</span></span><br><span class="line">  <span class="comment">// EXT_CTRL_JTYPE	      6&#x27;b000001</span></span><br><span class="line">  <span class="keyword">assign</span> EXTOp[<span class="number">5</span>]    = <span class="number">0</span>;</span><br><span class="line">  <span class="keyword">assign</span> EXTOp[<span class="number">4</span>]    = i_addi | itype_l | i_andi;</span><br><span class="line">  <span class="keyword">assign</span> EXTOp[<span class="number">3</span>]    = stype; </span><br><span class="line">  <span class="keyword">assign</span> EXTOp[<span class="number">2</span>]
