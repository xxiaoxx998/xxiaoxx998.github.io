  <script>
    (function () {
      const overlay = document.getElementById('home-welcome-overlay');
      const nav = document.querySelector('.category-nav');
      const toggle = document.getElementById('category-toggle');

      const defaultPoems = [
        '昨夜西风凋碧树，独上高楼，望尽天涯路。',
        '长风破浪会有时，直挂云帆济沧海。',
        '但愿人长久，千里共婵娟。',
        '海内存知己，天涯若比邻。',
        '春眠不觉晓，处处闻啼鸟。',
        '采菊东篱下，悠然见南山。'
      ];

      const sample = arr => arr[Math.floor(Math.random() * arr.length)];

      const fadeText = (el, text) => {
        if (!el) return;
        el.style.transition = 'opacity 0.6s ease';
        el.style.opacity = '0';
        setTimeout(() => {
          el.innerText = text;
          el.style.opacity = '1';
        }, 620);
      };

      const setRandomLine = ({ lines, suffix }) => {
        const sub = document.getElementById('welcome-subline');
        const hero = document.getElementById('category-hero-line');

        const one = sample(lines);
        const two = sample(lines);

        const format = line => (suffix ? `${line} ${suffix}` : line);

        fadeText(sub, format(one));
        fadeText(hero, format(two));
      };

      // 首先尝试从「今日诗词」API获取每日诗句，失败时回退到本地诗句库。
      const fetchDailyPoem = () =>
        fetch('https://v2.jinrishici.com/one.json', { headers: { Accept: 'application/json' } })
          .then(res => (res.ok ? res.json() : Promise.reject()))
          .then(data => {
            const content = data?.data?.content || '';
            const origin = data?.data?.origin?.title || '';
            const author = data?.data?.origin?.author || '';
            const lines = content
              .split(/(?<=。|！|？|；)/)
              .map(l => l.trim())
              .filter(Boolean);
            const suffix = origin ? `《${origin}》${author ? ` · ${author}` : ''}` : '';
            return { lines, suffix };
          });

      fetchDailyPoem()
        .then(poemData => {
          setRandomLine(poemData);
          setInterval(() => setRandomLine(poemData), 5000);
        })
        .catch(() => {
          fetch('/poems.json')
            .then(res => (res.ok ? res.json() : Promise.reject()))
            .then(poems => {
              setRandomLine({ lines: poems, suffix: '' });
              setInterval(() => setRandomLine({ lines: poems, suffix: '' }), 5000);
            })
            .catch(() => {
              setRandomLine({ lines: defaultPoems, suffix: '' });
              setInterval(() => setRandomLine({ lines: defaultPoems, suffix: '' }), 5000);
            });
        });

      // 欢迎提示自动隐藏
      if (overlay) {
        setTimeout(() => overlay.classList.add('hidden'), 2200);
        overlay.addEventListener('click', () => overlay.classList.add('hidden'));
      }

      // 分类导航折叠逻辑
      if (nav && toggle) {
        toggle.addEventListener('click', () => {
          nav.classList.toggle('collapsed');
          toggle.innerText = nav.classList.contains('collapsed') ? '展开分类' : '折叠分类';
        });
      }
    })();
  </script>

<script>
  window.addEventListener('tabs:register', () => {
    let { activeClass } = CONFIG.comments;
    if (CONFIG.comments.storage) {
      activeClass = localStorage.getItem('comments_active') || activeClass;
    }
    if (activeClass) {
      let activeTab = document.querySelector(`a[href="#comment-${activeClass}"]`);
      if (activeTab) {
        activeTab.click();
      }
    }
  });
  if (CONFIG.comments.storage) {
    window.addEventListener('tabs:click', event => {
      if (!event.target.matches('.tabs-comment .tab-content .tab-pane')) return;
      let commentClass = event.target.classList[1];
      localStorage.setItem('comments_active', commentClass);
    });
  }
</script>

});
